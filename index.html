    <style>
      /* Estilos para o nome da empresa na logo */
      .mobile-company-name {
        color: white;
        font-weight: 800;
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin-left: 10px;
        line-height: 1.1;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
      
      @media (max-width: 640px) {
        .mobile-company-name {
          font-size: 0.8rem;
        }
        /* Reduz um pouco a logo no celular para caber o texto e o botão */
        img[src*="logo-borracharia"] {
          max-height: 50px !important;
          width: auto !important;
        }
      }
      @media (min-width: 641px) {
        .mobile-company-name {
          font-size: 1.1rem;
        }
      }
    </style>
    <script>
      // Injeta o nome da empresa ao lado da logo assim que o React carregar
      const observer = new MutationObserver(() => {
        const logo = document.querySelector('img[src*="logo-borracharia"]');
        if (logo && !document.querySelector('.mobile-company-name')) {
          const span = document.createElement('span');
          span.className = 'mobile-company-name';
          span.innerHTML = 'Borracharia<br>Móvel';
          
          const parent = logo.parentElement;
          if (parent) {
            parent.style.display = 'flex';
            parent.style.alignItems = 'center';
            parent.style.textDecoration = 'none';
            parent.appendChild(span);
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
